# Durable home for the feedback ledger (lab 04). ReadWriteOnce is a fit,
# and a constraint: one node mounts this volume, which pairs with the
# workload's other invariant, replicas: 1.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: review-agent-state
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
