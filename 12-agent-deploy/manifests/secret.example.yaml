# EXAMPLE ONLY. Copy to secret.yaml, fill in real values, and never commit
# secret.yaml (the lab creates it with kubectl instead, which keeps real
# values out of your shell history file too if you use --from-literal
# with care, or out of the repo entirely with --from-env-file).
#
# Every key here is optional:
#   - ANTHROPIC_API_KEY   only if you skip the in-cluster vLLM
#   - DISCORD_*           only if you want the Discord interface
apiVersion: v1
kind: Secret
metadata:
  name: review-agent-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "your_key_here"
  DISCORD_BOT_TOKEN: "your_bot_token_here"
  DISCORD_CHANNEL_ID: "your_channel_id_here"
