# Send traffic for httpbin.example.com to the httpbin Service.
# Owned by the "app developer" role - references the operator's Gateway by name.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
spec:
  parentRefs:
  - name: http               # the Gateway above
    namespace: kgateway-system
  hostnames:
  - httpbin.example.com
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: httpbin
      port: 8000
