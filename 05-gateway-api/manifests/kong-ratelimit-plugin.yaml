# A Kong plugin: 5 requests/minute, counted locally. Then we re-apply the route with
# the konghq.com/plugins annotation so Kong attaches the plugin to it.
# Apply this whole file: `kubectl apply -f manifests/kong-ratelimit-plugin.yaml`
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rl-5-per-min
plugin: rate-limiting
config:
  minute: 5
  policy: local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-kong
  annotations:
    konghq.com/plugins: rl-5-per-min      # <-- attaches the plugin above
spec:
  parentRefs:
  - name: kong
  hostnames:
  - httpbin.kong.example.com
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: httpbin
      port: 8000
