# Kong's GatewayClass. Kong's controller does NOT auto-register one, so we create it
# explicitly. The "unmanaged" annotation tells KIC to bind to the data plane we already
# installed via Helm rather than provisioning a new one.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kong
  annotations:
    konghq.com/gatewayclass-unmanaged: "true"
spec:
  controllerName: konghq.com/kic-gateway-controller
