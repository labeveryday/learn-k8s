# Demo app used by every lab in this phase.
# go-httpbin echoes request info as JSON — perfect for *seeing* routing work.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  labels: { app: httpbin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: httpbin }
  template:
    metadata:
      labels: { app: httpbin }
    spec:
      containers:
      - name: httpbin
        image: mccutchen/go-httpbin:v2.15.0   # pin; check Docker Hub for latest
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet: { path: /get, port: 8080 }
          initialDelaySeconds: 2
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
spec:
  selector: { app: httpbin }
  ports:
  - name: http
    port: 8000
    targetPort: 8080
