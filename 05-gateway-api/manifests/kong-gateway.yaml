# A Gateway implemented by Kong. Same shape as the kgateway one - only the
# gatewayClassName differs. That's the Gateway API portability promise.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kong
spec:
  gatewayClassName: kong
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
