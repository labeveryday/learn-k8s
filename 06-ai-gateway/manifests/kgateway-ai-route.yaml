# kgateway-ai-route.yaml — route OpenAI chat traffic to the AI Backend.
# Compare to 05-gateway-api/manifests/httpbin-route.yaml: only the backendRef target
# changes (an AgentgatewayBackend of group agentgateway.dev / kind AgentgatewayBackend,
# not a plain Service). parentRef targets the "http" Gateway in kgateway-system,
# matching Phase 05.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: default
spec:
  parentRefs:
    - name: http
      namespace: kgateway-system
  hostnames:
    - "llm.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: vllm-ai
