# agent-helper.yaml — a complete agent as a Kubernetes object. No tools yet (lab-03).
# v1alpha2: agents are typed. A managed (controller-run) agent is `type: Declarative`,
# with the model + prompt nested under `declarative:`. `description` stays on `spec`.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-helper
  namespace: kagent
spec:
  description: "A concise Kubernetes helper backed by local vLLM."
  type: Declarative
  declarative:
    modelConfig: vllm
    systemMessage: |
      You are a concise Kubernetes assistant. Answer in one or two sentences.
      Prefer correctness over completeness. If unsure, say so.
