site_name: Learn Kubernetes → an AI Platform on Akamai
site_description: >-
  A panel-designed, offline-first curriculum — Linux → Docker → Kubernetes → vLLM, then the
  platform layer (gateways, AI gateway, agents, Wasm, Akamai LKE, RAG, observability).
site_author: Du'An Lightfoot
site_url: https://labeveryday.github.io/learn-k8s/
repo_url: https://github.com/labeveryday/learn-k8s
repo_name: labeveryday/learn-k8s
edit_uri: edit/main/

# Content lives in the repo root (phase folders), not a docs/ subdir. `docs_dir: .` points
# MkDocs at the repo root; the same-dir plugin resolves the site_dir-inside-docs_dir conflict.
docs_dir: .
plugins:
  - search
  - same-dir

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.sections     # phases as grouped sections in the sidebar
    - navigation.indexes      # a phase README becomes its section landing page
    - navigation.top          # back-to-top button
    - navigation.footer       # clickable prev / next at the bottom of every page
    - navigation.tracking
    - toc.follow
    - content.code.copy       # copy button on every code block
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition                # "What you should see" / "Break it" / gotcha callouts
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences      # fenced code + the ASCII diagrams
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

# Keep non-curriculum markdown out of the site (the agents/ template, project scaffolds, etc.)
exclude_docs: |
  /.venv/
  /.github/
  /site/
  /agents/
  /images/
  /.claude/
  /linode-deployment.md
  /requirements-docs.txt
  /02-docker/project-fastapi-redis/
  /02-docker/tmp/

