apiVersion: v1
kind: Namespace
metadata:
  name: strands-sandboxes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-manager
  namespace: strands-sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager
  namespace: strands-sandboxes
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-manager
  namespace: strands-sandboxes
subjects:
  - kind: ServiceAccount
    name: sandbox-manager
    namespace: strands-sandboxes
roleRef:
  kind: Role
  name: sandbox-manager
  apiGroup: rbac.authorization.k8s.io
---
# kubectl -n strands-sandboxes create secret generic sandbox-manager-secrets \
#   --from-literal=MANAGER_TOKEN=<token> \
#   --from-literal=AWS_ACCESS_KEY_ID=... (or use IRSA / pod identity instead)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: strands-sandboxes
  labels:
    app: sandbox-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-manager
  template:
    metadata:
      labels:
        app: sandbox-manager
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: manager
          image: YOUR_REGISTRY/strands-sandbox-manager:latest
          ports:
            - containerPort: 8700
          env:
            - name: SANDBOX_BACKEND
              value: "k8s"
            - name: SANDBOX_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SANDBOX_IMAGE
              value: "YOUR_REGISTRY/strands-sandbox-runtime:latest"
            - name: SANDBOX_PASSTHROUGH_ENV
              value: "AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_DEFAULT_REGION,AWS_REGION,ANTHROPIC_API_KEY,OPENAI_API_KEY,WORKER_MODEL_PROVIDER,WORKER_MODEL_ID"
          envFrom:
            - secretRef:
                name: sandbox-manager-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8700
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: strands-sandboxes
spec:
  selector:
    app: sandbox-manager
  ports:
    - port: 8700
      targetPort: 8700
