name: Deploy docs site

# Build the MkDocs Material site and publish it to GitHub Pages on every push to main.
# One-time setup in the repo: Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-docs.txt
      - run: mkdocs build --strict      # fail the build on broken links / nav warnings
        env:
          DISABLE_MKDOCS_2_WARNING: "true"   # silence a dependency's promotional v2 banner
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
