---
apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: llm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  strategy:
    type: Recreate                # PVC is RWO; avoid dual-attach
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests: { cpu: "1",   memory: "2Gi" }
            limits:   { cpu: "4",   memory: "6Gi" }
          startupProbe:
            httpGet: { path: /api/tags, port: 11434 }
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /api/tags, port: 11434 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/tags, port: 11434 }
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
spec:
  selector: { app: ollama }
  ports:
    - port: 11434
      targetPort: 11434
