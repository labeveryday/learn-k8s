# Phase 4 - point Kubernetes at the ollama already running on your Mac.
# No image pulls, no model re-downloads. You learn the K8s abstractions
# (Service, DNS, decoupling) using your existing local LLMs.
#
# Prereqs:
#   1. ollama is running on your Mac and reachable at http://localhost:11434
#      Verify:  curl http://localhost:11434/api/tags
#   2. ollama is bound to all interfaces, not just 127.0.0.1, so the
#      kind/Colima VM can reach it:
#        launchctl setenv OLLAMA_HOST 0.0.0.0:11434
#        (then restart the ollama app, or:  OLLAMA_HOST=0.0.0.0:11434 ollama serve)
#      Verify from a container:
#        docker run --rm curlimages/curl:latest curl -s http://host.docker.internal:11434/api/tags
#
# Mental model: an ExternalName Service is a CNAME inside cluster DNS.
# Pods resolving `ollama.llm.svc.cluster.local` get `host.docker.internal`,
# which Colima/Docker maps to your Mac's loopback.
---
apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
